name: Node.js CD (Continuous Deployment)

on:
  push:
    branches: [ "main" ] # Eksekusi otomatis saat push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Deploy ke VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}      # IP VPS kamu
        username: ${{ secrets.USERNAME }} # Biasanya 'root'
        password: ${{ secrets.PASSWORD }} # Password VPS kamu
        port: 22
        script: |
          cd /var/www/html/Deploy
          git pull origin main
          npm install --production
          pm2 restart all || pm2 start server.js --name "Deploy"
